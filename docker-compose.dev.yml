version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vortex_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: vortex_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: vortex_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
    driver: local
